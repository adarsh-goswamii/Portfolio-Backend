name: Deploy Portfolio Backend

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

env:
  IMAGE_NAME: portfolio-backend
  CONTAINER_NAME: portfolio-backend

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install ruff
      - run: ruff check .

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: portfolio_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/portfolio_test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements-dev.txt
      - run: alembic upgrade head
      - run: pytest

  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t ${{ env.IMAGE_NAME }}:${{ github.sha }} .

      - name: Save Docker image
        run: docker save ${{ env.IMAGE_NAME }}:${{ github.sha }} | gzip > image.tar.gz

      - name: Setup SSH key
        run: |
          echo "${{ secrets.EC2_SSH_KEY }}" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key

      - name: Copy image to EC2
        run: |
          scp -i /tmp/deploy_key \
            -o StrictHostKeyChecking=no \
            image.tar.gz \
            ${{ vars.EC2_USER }}@${{ vars.EC2_HOST }}:/tmp/image.tar.gz

      - name: Deploy on EC2
        run: |
          ssh -i /tmp/deploy_key \
            -o StrictHostKeyChecking=no \
            ${{ vars.EC2_USER }}@${{ vars.EC2_HOST }} << 'EOF'
            docker load < /tmp/image.tar.gz
            rm /tmp/image.tar.gz

            docker stop ${{ env.CONTAINER_NAME }} 2>/dev/null || true
            docker rm ${{ env.CONTAINER_NAME }} 2>/dev/null || true

            docker run -d \
              --name ${{ env.CONTAINER_NAME }} \
              --restart unless-stopped \
              -p 8000:8000 \
              -e "DATABASE_URL=${{ vars.DATABASE_URL }}" \
              -e "S3_BUCKET=${{ vars.S3_BUCKET }}" \
              -e "AWS_REGION=${{ vars.AWS_REGION }}" \
              ${{ env.IMAGE_NAME }}:${{ github.sha }}

            docker image prune -f
          EOF

      - name: Cleanup SSH key
        if: always()
        run: rm -f /tmp/deploy_key
